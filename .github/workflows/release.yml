name: Attach release zip

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist/EDMC-Screenshot-Linux
          cp load.py LICENSE README.md dist/EDMC-Screenshot-Linux/
          cd dist
          zip -r EDMC-Screenshot-Linux.zip EDMC-Screenshot-Linux/
          sha256sum EDMC-Screenshot-Linux.zip > SHA256SUMS.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/EDMC-Screenshot-Linux.zip \
            dist/SHA256SUMS.txt \
            --clobber
